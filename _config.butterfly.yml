# ==============================================================================
# Butterfly 主题配置文件
# 文档：https://butterfly.js.org/
# ==============================================================================

# =================================== 基础设置 ===================================

# 导航菜单
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link
  关于我: /about/ || fas fa-heart

# 导航栏外观
nav:
  logo: images/logo.JPEG          # 导航栏logo图片路径
  display_title: true             # 是否显示网站标题
  fixed: false                    # 导航栏是否固定(滚动时保持顶部)

# 社交图标
social:
  fab fa-github: https://github.com/Xuxu0927 || Github
  fas fa-envelope: mailto:2889087473@qq.com || Email

# 页脚设置
footer:
  owner:
    enable: true                  # 是否显示站点作者/起始年份
    since:                        # 留空，不显示起始年份
  custom_text:                    # 自定义页脚文字
  copyright: true                 # 显示主题和框架版权信息

# 网站图标
favicon: images/logo.JPEG

# 头像设置
avatar:
  img: images/tx.jpg              # 头像图片路径
  effect: false                   # 头像是否启用旋转特效

# 站点运行时间
runtimeshow:
  enable: true
  publish_date: 2026/05/01        # 起始日期（格式：月/日/年 时:分 或 年/月/日）

# 不蒜子统计（访客/浏览量）
busuanzi:
  site_uv: true                   # 站点总访客数
  site_pv: true                   # 站点总浏览量
  page_pv: true                   # 文章浏览量

# 站长验证（SEO）
# site_verification:
# - name: google-site-verification
#   content: xxxxxx
# - name: baidu-site-verification
#   content: xxxxxxx

# =================================== 视觉样式 ===================================

# 顶部大图（全局）
disable_top_img: false            # 是否禁用所有页面的顶部大图
index_img:                        # 首页顶部大图（留空则用default_top_img）
default_top_img:                  # 未单独设置top_img的页面的默认顶部图
archive_img:                      # 归档页顶部大图
tag_img:                          # 单个标签页（如/tags/xxx）的顶部图
tag_per_img:                      # 按标签名单独指定顶部图
category_img:                     # 单个分类页的顶部图
category_per_img:                 # 按分类名单独指定顶部图

# 文章封面
cover:
  index_enable: true              # 首页是否显示封面
  aside_enable: true              # 侧边栏是否显示封面
  archives_enable: true           # 归档页是否显示封面
  position: both                  # 封面位置：left/right/both
  default_cover:                  # 默认封面图片

# 图片加载失败占位图
error_img:
  flink: images/friend_404.gif    # 友链头像加载失败
  post_page: images/404.jpg       # 文章内图片加载失败

# 自定义404页面
error_404:
  enable: false
  subtitle: 'Page Not Found'
  background: https://i.loli.net/2020/05/19/aKOcLiyPl2JQdFD.png

# 全局背景与动画
background: images/beijing.jpg                      # 网站全局背景
footer_bg: false                  # 页脚独立背景
rightside-bottom:                 # 右下角按钮距底部距离
enter_transitions: true           # 页面切换动画

# 静止彩带背景
canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

# 动态彩带背景
canvas_fluttering_ribbon:
  enable: true
  mobile: false

# 线条网络背景
canvas_nest:
  enable: false
  color: '0,0,255'                # RGB颜色
  opacity: 0.7
  zIndex: -1
  count: 99
  mobile: false

# 打字特效（Power Mode）
activate_power_mode:
  enable: true
  colorful: true                  # 粒子特效
  shake: true                     # 抖动特效
  mobile: false

# 鼠标点击烟花特效
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 鼠标点击爱心特效
click_heart:
  enable: false
  mobile: false

# 鼠标点击文字特效
ClickShowText:
  enable: false
  text:
  fontSize: 15px
  random: false
  mobile: false

# 字体设置
font:
  global-font-size: 
  code-font-size: 
  font-family: 
  code-font-family: 

# 博客标题字体
blog_title_font:
  font_link:
  font-family:

# 水平分割线图标
hr_icon:
  enable: true
  icon:
  icon-top:

#主题颜色自定义（可选）
theme_color:
  enable: true                      # 开启主题颜色自定义
  main: "#6C5CE7"                   # 主题主色调：控制导航栏高亮、链接、按钮、标签等主要元素（优雅淡紫）
  paginator: "#A8A4FF"              # 分页器颜色：控制首页/归档页的“上一页/下一页”激活状态的颜色（柔和淡紫蓝）
  button_hover: "#5A4BCF"           # 按钮悬浮色：鼠标悬停在按钮上时的背景/边框颜色（深一点的紫色）
  text_selection: "#E8E2FF"         # 文本选中背景色：用户用鼠标选中文字时的高亮颜色（淡紫白）
  link_color: "#4A69BD"             # 普通链接颜色：文章正文中未特殊定义的超链接颜色（沉稳的蓝色）
  meta_color: "#95A5A6"             # 元数据颜色：文章发布日期、分类、标签、阅读量等附属信息的文字颜色（中性灰绿）

# 首页顶部图高度等微调
index_site_info_top:
index_top_img_height:

# 分类/标签页UI样式
category_ui:
tag_ui:

# 默认显示模式
display_mode: light

# 文章标题美化
beautify:
  enable: false
  field: post
  title-prefix-icon: '⭐' 
  title-prefix-icon-color: '#f1c40f'

# 加载动画
preloader:
  enable: true
  source: 1                       # 1:全屏动画, 2:进度条
  pace_css_url:

# 主页副标题（打字机效果）
subtitle:
  enable: true
  effect: true
  typed_option:
  source: false
  sub: 热爱生活 记录分享

# 图片灯箱
medium_zoom: false
fancybox: true

# =================================== 文章与内容 ===================================

# 文章元数据显示
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# 字数统计与阅读时间（需插件）
wordcount:
  enable: false
  post_wordcount: true
  min2read: true
  total_wordcount: true

# 首页文章摘要
index_post_content:
  method: 3                       # 1:description, 2:混合, 3:自动摘要
  length: 500

# 锚点（滚动更新URL）
anchor:
  button:
    enable: false
    always_show: false
    icon:
  auto_update: false

# 目录（TOC）
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

# 文章版权信息
post_copyright:
  enable: false
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏功能
reward:
  enable: false
  QR_code:

# 文章编辑链接（如GitHub）
post_edit:
  enable: false
  url:

# 相关文章推荐
related_post:
  enable: true
  limit: 6
  date_type: updated

# 图片描述显示
photofigcaption: false

# 文章分页导航
post_pagination: false

# 文章过期提醒
noticeOutdate:
  enable: false
  style: flat
  limit_day: 500
  position: top
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# 分享系统（Share.js）
sharejs:
  enable: true
  sites: facebook,twitter,wechat,weibo,qq

# 其他分享（AddThis / AddToAny）
addThis:
  enable: false
  pubid:
addtoany:
  enable: false
  item: facebook,twitter,wechat,sina_weibo,facebook_messenger,email,copy_link

# 评论系统（通用配置）
comments:
  use:
  text: true
  lazyload:
    enable: true
    field: site
    blur: true
  count: false
  card_post_count: false

# Disqus
disqus:
  shortname:
  apikey:

# DisqusJS（墙内版）
disqusjs:
  shortname:
  apikey:
  option:

# 来必力
livere:
  uid:

# Gitalk（GitHub Issue）
gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

# Valine（LeanCloud）
valine:
  appId:
  appKey:
  avatar: monsterid
  serverURLs:
  bg:
  visitor: false
  option:

# Waline
waline:
  serverURL:
  bg:
  pageview: false
  option:

# Utterances
utterances:
  repo:
  issue_term: pathname
  light_theme: github-light
  dark_theme: photon-dark

# Facebook评论
facebook_comments:
  app_id:
  user_id:
  pageSize: 10
  order_by: social
  lang: zh_TW

# Twikoo
twikoo:
  envId:
  region:
  visitor: false
  option:

# Giscus
giscus:
  repo:
  repo_id:
  category_id:
  theme:
    light: light
    dark: dark
  option:

# Remark42
remark42:
  host:
  siteId:
  option:

# Artalk
artalk:
  server:
  site:
  visitor: false
  option:

# 聊天/客服服务
chat_btn: false
chat_hide_show: false

chatra:
  enable: false
  id:
tidio:
  enable: false
  public_key:
daovoice:
  enable: false
  app_id:
gitter:
  enable: false
  room:
crisp:
  enable: false
  website_id:
messenger:
  enable: false
  pageID:
  lang: zh_TW


# =================================== 侧边栏与右下角 ===================================

# 侧边栏全局配置
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true

# 作者卡片
  card_author:
    enable: true
    description:
    button:
      enable: false
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/Xuxu0927

# 公告卡片
  card_announcement:
    enable: true
    content: This is my Blog

# 最新文章卡片
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:

# 分类卡片
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:

# 标签卡片
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
    sort_order:

# 归档卡片
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:

# 站点信息卡片
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# 最新评论（需评论系统支持）
newest_comments:
  enable: false
  sort_order:
  limit: 6
  storage: 10
  avatar: true

# 右下角繁简转换
translate:
  enable: false
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '简'

# 阅读模式按钮
readmode: true

# 深色模式
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# 返回顶部显示百分比
rightside_scroll_percent: false

# 右下角按钮顺序（一般不动）
rightside_item_order:
  enable: false
  hide:
  show:


# =================================== 代码与数学 ===================================

# 代码高亮主题
highlight_theme: mac light
highlight_copy: true              # 复制按钮
highlight_lang: true              # 显示语言
highlight_shrink: false           # 收缩状态
highlight_height_limit: false     # 高度限制
code_word_wrap: true              # 自动换行
code_block_line_numbers: true     # 显示行号

# 复制内容设置
copy:
  enable: true
  copyright:
    enable: false
    limit_count: 50

# MathJax 数学公式
mathjax:
  enable: true
  per_page: false

# KaTeX（备选）
katex:
  enable: false
  per_page: false
  hide_scrollbar: true


# =================================== 搜索与性能 ===================================

# Algolia 搜索
algolia_search:
  enable: false
  appId: ""
  apiKey: ""
  indexName: ""
  hits:
    per_page: 6

# 本地搜索（基于hexo-generator-searchdb）
local_search:
  enable: true
  preload: true
  CDN:

# Docsearch
docsearch:
  enable: false
  appId:
  apiKey:
  indexName:
  option:

# Pjax 无刷新加载
pjax:
  enable: true
  exclude:
    - /music/
    - /movies/

# 图片懒加载
lazyload:
  enable: false
  field: site
  placeholder:
  blur: false

# 预加载（instant.page）
instantpage: false

# 中英文自动加空格
pangu:
  enable: false
  field: site

# 吐司通知
snackbar:
  enable: false
  position: bottom-left
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# APlayer 音乐播放器注入
# aplayerInject:
#  enable: true
#  per_page: true

# Mermaid 图表
mermaid:
  enable: false
  theme:
    light: default
    dark: dark

# Note 提示框
note:
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0


# =================================== 统计与广告 ===================================

# 百度统计 ID
baidu_analytics:

# Google Analytics ID
google_analytics:

# Cloudflare Analytics
cloudflare_analytics:

# Microsoft Clarity ID
microsoft_clarity:

# Google Adsense
google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

# 手动广告插入（高级）
# ad:
#   index:
#   aside:
#   post:


# =================================== 高级配置 ===================================

# Open Graph 元数据（社交媒体卡片）
Open_Graph_meta:
  enable: true
  option:

# 添加CSS浏览器前缀
css_prefix: true

# 自定义代码注入
inject:
  head:
      - <link rel="stylesheet" href="/css/custom.css">
  bottom:
      - <div id="xf-MusicPlayer" data-cdnName="https://player.xfyun.club/js"  data-themeColor="xf-original"></div>
        <script src="https://player.xfyun.club/js/xf-MusicPlayer/js/xf-MusicPlayer.min.js"></script>
      - <script src="/js/random-bg.js"></script>

# CDN 配置
CDN:
  internal_provider: local
  third_party_provider: jsdelivr
  version: false
  custom_format:
  option:

# PWA 配置（需安装 hexo-offline）
# pwa:
#   enable: false
#   manifest: /pwa/manifest.json
#   apple_touch_icon: /pwa/apple-touch-icon.png