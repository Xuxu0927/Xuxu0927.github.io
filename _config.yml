# ==============================================================================
# Hexo 站点配置文件
# 文档：https://hexo.io/zh-cn/docs/configuration.html
# ==============================================================================

# =================================== 站点信息 ===================================

# 网站标题
title: Xuxu's Blog

# 网站副标题
subtitle: 热爱生活 记录分享

# 网站描述（SEO）
description: 分享学习笔记与生活感悟

# 网站关键词（SEO，逗号分隔）
keywords: blog, hexo, github

# 作者名称
author: Xuxu

# 网站语言（简体中文）
language: zh-CN

# 时区（亚洲/上海）
timezone: Asia/Shanghai


# =================================== 网址与链接 ===================================

# 网站的完整 URL（部署后访问地址）
url: https://Xuxu0927.github.io

# 文章永久链接格式（年/月/日/标题）
permalink: :year/:month/:day/:title/

# 永久链接默认值（一般留空）
permalink_defaults:

# 美化 URL 设置
pretty_urls:
  trailing_index: false   # 移除 URL 末尾的 index.html
  trailing_html: false    # 移除 URL 末尾的 .html


# =================================== 目录与文件 ===================================

# 源文件目录（存放 Markdown 等源文件）
source_dir: source

# 生成的静态文件输出目录
public_dir: public

# 标签页面目录
tag_dir: tags

# 归档页面目录
archive_dir: archives

# 分类页面目录
category_dir: categories

# 代码文件目录
code_dir: downloads/code

# 国际化目录（多语言）
i18n_dir: :lang

# 跳过渲染的文件或目录
skip_render:


# =================================== 文章写作 ===================================

# 新建文章时的默认文件名格式
new_post_name: :title.md

# 默认布局（post / draft / page）
default_layout: post

# 是否自动将标题转换为首字母大写
titlecase: false

# 外部链接设置
external_link:
  enable: true        # 在新标签页打开外部链接
  field: site         # 应用到全站
  exclude: ''         # 排除的域名

# 文件名大小写敏感
filename_case: 0

# 是否渲染草稿
render_drafts: false

# 开启资源文件夹（每篇文章独立资源目录）
post_asset_folder: true

# 使用相对路径引用资源
relative_link: false

# 发布未来的文章
future: true

# # 代码高亮（已禁用，改用 PrismJS）
# highlight:
#   enable: false
#   line_number: false
#   auto_detect: false
#   tab_replace: ''
#   wrap: false
#   hljs: false

# # PrismJS 代码高亮配置
# prismjs:
#   enable: false        # 启用 PrismJS
#   preprocess: true    # 预处理
#   line_number: true   # 显示行号
#   tab_replace: ''     # 替换制表符


# =================================== 首页与分页 ===================================

# 首页生成器配置
index_generator:
  path: ''            # 首页路径（空表示根路径）
  per_page: 10        # 每页显示文章数（0 表示不分页）
  order_by: -date     # 按日期降序排列

# 分页设置
per_page: 10          # 每页文章数（归档、分类、标签页）
pagination_dir: page  # 分页目录名称


# =================================== 分类与标签 ===================================

# 默认分类（当文章未指定分类时使用）
default_category: suibi

# 分类映射（一般留空）
category_map:

# 标签映射（一般留空）
tag_map:


# =================================== 元数据与日期 ===================================

# 是否生成 meta 元数据标签（SEO）
meta_generator: true

# 日期格式
date_format: YYYY-MM-DD

# 时间格式
time_format: HH:mm:ss

# 更新时间戳来源（mtime = 文件修改时间, date = 文章中 date 字段, empty = 不使用）
updated_option: 'mtime'


# =================================== 主题与部署 ===================================

# 使用的主题名称（butterfly）
theme: butterfly

# 部署配置（Git 方式）
deploy:
  - type: git         # 部署类型：Git
    repo: git@github.com:Xuxu0927/Xuxu0927.github.io.git   # 仓库地址（SSH）
    branch: main      # 推送到 main 分支（GitHub Pages 源）


# =================================== 其他高级选项 ===================================

# 包含特定文件（相对于 source 目录）
include:

# 排除特定文件
exclude:

# 忽略特定文件或目录（不处理）
ignore: