name: 自动构建并部署 Hexo 博客

on:
  push:
    branches:
      - main  # 设置为你的默认分支名

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目源码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"   # 替换成你本地的 Node.js 主版本

      - name: 安装项目依赖
        run: npm install   # 这句命令会在云端自动安装 package.json 里的所有插件

      - name: 清理、生成并部署博客
        run: |
          npm run clean   # 如果你的 package.json 定义了 clean 脚本
          npm run build   # 或 hexo generate
          npm run deploy  # 或 hexo deploy
        env:
          # 如果部署需要 token，可以在这里配置，请在 GitHub 仓库的 Secrets 中添加
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}