name: Hexo 自动部署

on:
  push:
    branches: [ yuanma ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          ref: yuanma

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm

      - name: 安装依赖
        run: npm install

      - name: 配置Git
        run: |
          git config --global user.name "Xuxu0927"
          git config --global user.email "2889087473@qq.com"

      - name: 生成静态文件
        run: |
          npx hexo clean
          npx hexo generate

      - name: 部署到main分支
        run: npx hexo deploy --repo https://x-access-token:${GITHUB_TOKEN}@github.com/Xuxu0927/Xuxu0927.github.io.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}